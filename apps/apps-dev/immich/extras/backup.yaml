apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: immich-pvc-daily
  namespace: velero
spec:
  schedule: "0 2 * * *"
  template:
    includedNamespaces:
      - immich
    excludedResources:
      - deployments
      - services
      - ingresses
      - configmaps
      - serviceaccounts
    ttl: 168h0m0s
