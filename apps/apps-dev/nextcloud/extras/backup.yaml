apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: nextcloud-pvc-daily
  namespace: velero
spec:
  schedule: "0 1 * * *"
  template:
    defaultVolumesToFsBackup: false
    snapshotMoveData: true
    includedNamespaces:
      - nextcloud
    excludedResources:
      - deployments
      - services
      - ingresses
      - configmaps
      - serviceaccounts
    ttl: 168h0m0s
